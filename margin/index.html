<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./styles/styles.css">

</head>
<body>
    <p class="titulo">🎮 Margin e Padding — Estilo Gamer</p>
    <div class="paddin">
        <p>🎯 Padding: 30px — espaço interno</p>
        <p>O escudo azul cresceu para dentro.</p>
    </div>
    <div class="margin">
        <p>⚔️ Margin: 30px — espaço externo</p>
        <p>O bloco verde se afastou dos outros.</p>
    </div>
    <div class="padding-margin">
        <p>🔥 Margin: 20px + Padding: 20px</p>
        <p>Margin afasta por fora. Padding cresce por dentro.</p>
    </div>
</body>
</html>
